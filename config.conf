# Server 1: Standard Web Server
server {
    listen 8080;
    listen 127.0.0.1:9090;
    server_names webserv.com www.webserv.com 127.0.0.1 127.0.0.1:9090;
    
    root src/www;
    client_max_body_size 1G;
    
    # Testing your multi-code error page logic
    error_pages 400 401 403 404 405 /errors/40x.html;
    error_pages 500 501 502 503 504 /errors/50x.html;

    # Testing root inheritance
    location / {
        methods GET;
        index index.html;
        autoindex on;
    }
     location /images {
        methods GET;
        index cat.html;
        root src/www/images;
    }
    location /tmp {
        root src/www/tmp;
    methods DELETE;
    }

    location /directory {
        root YoupiBanane;
        index youpi.bad_extension;
        methods GET POST; 
        
        # Any file with .bla as extension must answer to POST request by calling the cgi_test executable
        cgi bla ./ubuntu_cgi_tester;
    }

    # Testing POST and Uploads
    location /upload {
        methods POST;
        root src/www/uploads;
        upload_path var/www/uploads;
        
    }
    
    # Testing CGI logic with multiple handlers
    location /cgi-bin {
        methods GET POST;
        root src/www/cgi-bin;
        cgi py /usr/bin/python3;
        cgi php /usr/bin/php-cgi;
    }

    # Testing Redirection
    location /old-page {
        return_code 301;
        return_url http://newsite.com/home;
    }
}














server {
    listen 127.0.0.1:8081;
    server_name localhost;
    root ./www;
    client_max_body_size 10485760;  # 10MB
    
    # Upload endpoint
    location /upload {
        methods POST;
        root ./uploads;
        upload_path ./uploads;
    }
    
    # CGI endpoint (can handle POST)
    location /cgi-bin {
        methods GET POST;
        root ./src/www/cgi-bin;
        cgi .php /usr/bin/php;
        cgi .py /usr/bin/python3;
    }
    
    # Regular location
    location / {
        methods GET;
        root ./www;
        autoindex on;
        index index.html;
    }
}