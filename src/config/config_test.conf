# Global comments are ignored by your tokenizer

server {
    # 1. Multiple Listeners (Virtual Hosting)
    listen 0.0.0.0:8080;
    listen 127.0.0.1:8081;
    
    # 2. Server Names (Multiple names allowed)
    server_name webserv.com www.webserv.com;

    # 3. Inheritance: Define a default root for the whole server
    root ./html;
    
    # 4. Default error pages
    error_page 404 /error/404.html;
    error_page 500 502 503 504 /error/50x.html;

    # 5. Global Body Size Limit
    client_max_body_size 10M;

    # Case: Simple root location
    location / {
        methods GET;
        index index.html;
        autoindex on; # Allows directory listing if index is missing
    }

    # Case: Explicit root override
    location /static {
        root ./html/static_assets;
        methods GET;
    }

    # Case: File Upload handling
    location /upload {
        methods POST DELETE;
        upload_path ./html/uploads;
    }

    # Case: Redirection (301 Moved Permanently)
    location /old-page {
        return 301 /new-page.html;
    }

    # Case: CGI configuration for different languages
    location /cgi-bin {
        methods GET POST;
        cgi_pass py /usr/bin/python3;
        cgi_pass php /usr/bin/php-cgi;
    }
}

# SECOND SERVER BLOCK (Testing Virtual Hosting on same port)
server {
    listen 0.0.0.0:8080;
    server_name second-site.com;

    root ./html/second_site;

    location / {
        methods GET;
        index main.html;
    }
}