<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>400 Bad Request</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f6f8fa;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #d97706;
            --border: #e5e7eb;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111827;
                --card: #1f2937;
                --text: #f9fafb;
                --muted: #9ca3af;
                --accent: #f59e0b;
                --border: #374151;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 560px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 28px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .code {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            color: var(--accent);
            margin: 0 0 16px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.8rem;
        }

        p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <main class="card" role="main" aria-labelledby="title">
        <div class="code">400</div>
        <h1 id="title">Bad Request</h1>
        <p>The server could not understand the request due to invalid syntax.</p>
    </main>
</body>
</html>
