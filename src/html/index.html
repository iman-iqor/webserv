<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin: 0 0 1rem;
            color: #222;
        }

        p {
            margin: 0 0 2rem;
            color: #555;
        }

        button {
            padding: 0.9rem 1.6rem;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Welcome</h1>
        <p>Go to the login page to continue.</p>
        <button onclick="window.location.href='/login'">Login</button>
    </main>
</body>
</html>
